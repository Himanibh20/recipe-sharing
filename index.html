<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Recipe Share</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>🍽️ Recipe Sharing Platform</h1>
    
    <form id="recipeForm">
      <input type="text" id="title" placeholder="Recipe Title" required />
      <textarea id="description" placeholder="Short Description" required></textarea>
      <textarea id="instructions" placeholder="Instructions" required></textarea>
      <button type="submit">Add Recipe</button>
    </form>

    <div id="recipes" class="recipe-list"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
